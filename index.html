<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>Playbook · David</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0A0A0A;
  --surface: #141414;
  --surface-2: #1C1C1C;
  --surface-3: #242424;
  --border: #2A2A2A;
  --border-light: #383838;
  --text: #FAFAFA;
  --text-2: #A0A0A0;
  --text-3: #606060;
  --accent: #D4FF4E;
  --accent-dark: #0F1A00;
  --danger: #FF4E4E;
  --warning: #FFA94E;
  --success: #4EFF8A;
  --info: #4EA8FF;
}
html { scroll-behavior: smooth; overscroll-behavior: none; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ========== APP SHELL ========== */
.app {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-top: env(safe-area-inset-top);
}

/* ========== HEADER ========== */
.header {
  position: sticky;
  top: 0;
  top: env(safe-area-inset-top);
  background: rgba(10, 10, 10, 0.92);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  z-index: 100;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  font-style: italic;
  letter-spacing: -0.02em;
  color: var(--text);
}
.logo em {
  font-style: normal;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.1em;
  vertical-align: 3px;
  margin-left: 6px;
}
.back-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.15s;
}
.back-btn.show { display: flex; }
.back-btn:active { background: var(--surface-2); transform: scale(0.94); }
.page-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  display: none;
}
.page-title.show { display: block; }

/* ========== SEARCH ========== */
.search-wrap {
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 44px 13px 44px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
}
.search-input:focus {
  border-color: var(--accent);
  background: var(--surface-2);
}
.search-input::placeholder {
  color: var(--text-3);
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
  width: 18px;
  height: 18px;
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface-3);
  border: none;
  color: var(--text-2);
  width: 28px;
  height: 28px;
  border-radius: 8px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.search-clear.show { display: flex; }

/* ========== MAIN ========== */
main {
  padding: 20px 16px 100px;
}

/* ========== HOME ========== */
.home-view { display: block; }
.home-view.hidden { display: none; }

.intro {
  margin-bottom: 28px;
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.intro::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
  opacity: 0.15;
}
.intro-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.intro-label::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.intro-title {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  line-height: 1.15;
  font-style: italic;
  color: var(--text);
  margin-bottom: 6px;
}
.intro-sub {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
}

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Flow Stages */
.flow-stages {
  display: grid;
  gap: 10px;
  margin-bottom: 8px;
}
.flow-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
}
.flow-card:active {
  transform: scale(0.98);
  background: var(--surface-2);
}
.flow-card-num {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  font-style: italic;
  line-height: 1;
  width: 44px;
  text-align: center;
  flex-shrink: 0;
}
.flow-card-content {
  flex: 1;
  min-width: 0;
}
.flow-card-title {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 2px;
}
.flow-card-desc {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.4;
}
.flow-card-arrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text-3);
  flex-shrink: 0;
}
.flow-card-1 .flow-card-num { color: var(--info); }
.flow-card-2 .flow-card-num { color: var(--accent); }
.flow-card-3 .flow-card-num { color: var(--warning); }

/* Quick Access Grid */
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.quick-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.18s;
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 96px;
}
.quick-card:active {
  transform: scale(0.96);
  background: var(--surface-2);
}
.quick-card-icon {
  font-size: 18px;
  width: 32px;
  height: 32px;
  background: var(--surface-2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.quick-card-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  line-height: 1.25;
}
.quick-card.featured {
  background: var(--accent);
  color: var(--accent-dark);
  border-color: var(--accent);
  grid-column: span 2;
  flex-direction: row;
  align-items: center;
  min-height: auto;
}
.quick-card.featured .quick-card-icon {
  background: rgba(15, 26, 0, 0.15);
  color: var(--accent-dark);
}
.quick-card.featured .quick-card-title {
  color: var(--accent-dark);
  font-size: 14px;
}
.quick-card.featured .quick-card-desc {
  color: rgba(15, 26, 0, 0.7);
  font-size: 11px;
  margin-top: 2px;
}

/* Favorites */
.fav-section {
  margin-top: 28px;
}
.fav-empty {
  padding: 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: 12px;
}

/* ========== SCENARIO VIEW ========== */
.scenario-view { display: none; }
.scenario-view.active { display: block; }

.scenario-header {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.scenario-header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.scenario-header-title {
  font-family: 'Instrument Serif', serif;
  font-size: 26px;
  line-height: 1.1;
  font-style: italic;
  color: var(--text);
  margin-bottom: 4px;
}
.scenario-header-desc {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
}

/* Message Cards */
.msg-group {
  margin-bottom: 16px;
}
.msg-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.msg-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 500;
}
.fav-btn {
  background: transparent;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  transition: all 0.15s;
  line-height: 1;
}
.fav-btn.active {
  color: var(--accent);
}
.fav-btn:active {
  transform: scale(1.2);
}

.msg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  white-space: pre-wrap;
  font-family: inherit;
  text-align: left;
  width: 100%;
  display: block;
}
.msg-card:active {
  background: var(--surface-2);
  transform: scale(0.99);
}
.msg-card.type-wa {
  border-left: 3px solid var(--success);
}
.msg-card.type-zoom {
  border-left: 3px solid var(--info);
  font-style: italic;
  color: #E0E0E0;
}
.msg-card.type-urgent {
  border-left: 3px solid var(--danger);
}
.msg-card.type-warm {
  border-left: 3px solid var(--warning);
}
.msg-card-tap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}

/* Tip boxes */
.tip {
  padding: 12px 14px;
  border-radius: 12px;
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.55;
  border: 1px solid;
  display: flex;
  gap: 10px;
}
.tip-icon {
  flex-shrink: 0;
  font-size: 15px;
  line-height: 1.4;
}
.tip.gold {
  background: rgba(212, 255, 78, 0.05);
  border-color: rgba(212, 255, 78, 0.3);
  color: #E8FFA0;
}
.tip.red {
  background: rgba(255, 78, 78, 0.05);
  border-color: rgba(255, 78, 78, 0.3);
  color: #FFB8B8;
}
.tip.info {
  background: rgba(78, 168, 255, 0.05);
  border-color: rgba(78, 168, 255, 0.3);
  color: #B8DBFF;
}

/* Subsection */
.subsection-title {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  font-style: italic;
  color: var(--text);
  margin: 24px 0 10px;
  line-height: 1.2;
}
.subsection-divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* Phase cards (zoom phases) */
.phase-row {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.phase-badge {
  flex-shrink: 0;
  width: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border-right: 1px solid var(--border);
  padding-right: 12px;
}
.phase-num {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-style: italic;
  line-height: 1;
  color: var(--accent);
}
.phase-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-3);
}
.phase-content {
  flex: 1;
}
.phase-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 4px;
}
.phase-title {
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 4px;
}
.phase-desc {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.5;
}

/* FUP Day */
.fup-day {
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  position: relative;
}
.fup-day-badge {
  flex-shrink: 0;
  width: 50px;
  height: 50px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Instrument Serif', serif;
  background: var(--surface-2);
}
.fup-day-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 1px;
}
.fup-day-num {
  font-style: italic;
  font-size: 22px;
  line-height: 1;
  font-weight: 400;
}
.fup-day-content { flex: 1; }
.fup-day-title {
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 4px;
}
.fup-day-desc {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.5;
  margin-bottom: 10px;
}

/* Price Cards */
.price-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
}
.price-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.price-card-name {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text);
}
.price-card-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}
.price-card-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 12.5px;
}
.price-card-row-label {
  color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.price-card-row-val {
  color: var(--text);
  font-weight: 500;
  text-align: right;
  max-width: 60%;
}

/* Objeciones list */
.obj-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}
.obj-q {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--warning);
  margin-bottom: 8px;
}
.obj-a {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.55;
}

/* Search results */
.search-results {
  display: none;
}
.search-results.active {
  display: block;
}
.search-result-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
  display: block;
}
.search-result-item:active {
  background: var(--surface-2);
}
.search-result-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 5px;
}
.search-result-location {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 6px;
}
.search-result-preview {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.search-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-3);
  font-size: 14px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: var(--accent-dark);
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 200;
  box-shadow: 0 10px 40px rgba(212, 255, 78, 0.3);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (min-width: 521px) {
  .app {
    min-height: auto;
    margin-top: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
}
</style>
</head>
<body>

<div class="app">

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div style="display: flex; align-items: center; gap: 10px;">
      <button class="back-btn" id="backBtn" onclick="goHome()">←</button>
      <div class="logo" id="logo">Playbook <em>v7</em></div>
      <div class="page-title" id="pageTitle"></div>
    </div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="search" class="search-input" id="searchInput" placeholder="Buscar mensaje, objeción, escenario..." autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
</header>

<main>

<!-- HOME VIEW -->
<div class="home-view" id="homeView">

  <div class="intro">
    <div class="intro-label">Online · Luque Academy</div>
    <div class="intro-title">¿Dónde estás<br>con el lead?</div>
    <div class="intro-sub">Toca según el momento. O busca arriba.</div>
  </div>

  <div class="section-label">Flujo del lead</div>
  <div class="flow-stages">
    <button class="flow-card flow-card-1" onclick="abrirEscenario('antes')">
      <div class="flow-card-num">01</div>
      <div class="flow-card-content">
        <div class="flow-card-title">Antes del Zoom</div>
        <div class="flow-card-desc">Confirmación, 24h, 2h antes</div>
      </div>
      <div class="flow-card-arrow">→</div>
    </button>
    <button class="flow-card flow-card-2" onclick="abrirEscenario('durante')">
      <div class="flow-card-num">02</div>
      <div class="flow-card-content">
        <div class="flow-card-title">Durante el Zoom</div>
        <div class="flow-card-desc">5 fases · Urgencia · Cierre</div>
      </div>
      <div class="flow-card-arrow">→</div>

// ========== STATE ==========
let favorites = JSON.parse(localStorage.getItem('playbook_favs') || '[]');
let currentView = 'home';

// ========== NAVIGATION ==========
function abrirEscenario(id) {
  const data = DATA[id];
  if (!data) return;

  currentView = id;
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('scenarioView').classList.add('active');
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('logo').style.display = 'none';
  document.getElementById('pageTitle').classList.add('show');
  document.getElementById('pageTitle').textContent = data.label || data.title;

  renderScenario(data);
  window.scrollTo(0, 0);
}

function goHome() {
  currentView = 'home';
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('scenarioView').classList.remove('active');
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('logo').style.display = '';
  document.getElementById('pageTitle').classList.remove('show');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderFavorites();
}

// ========== RENDER ==========
function renderScenario(data) {
  const container = document.getElementById('scenarioView');
  let html = `
    <div class="scenario-header">
      <div class="scenario-header-label">${data.label}</div>
      <div class="scenario-header-title">${data.title}</div>
      <div class="scenario-header-desc">${data.desc}</div>
    </div>
  `;

  if (data.tip) {
    html += `<div class="tip ${data.tip.type}"><span class="tip-icon">${data.tip.type === 'red' ? '⛔' : data.tip.type === 'gold' ? '⭐' : 'ℹ️'}</span><div>${data.tip.text}</div></div>`;
  }

  // Phases (Durante zoom)
  if (data.phases) {
    html += `<div class="subsection-title">Las 5 fases del Zoom</div>`;
    data.phases.forEach(p => {
      html += `
        <div class="phase-row">
          <div class="phase-badge">
            <div class="phase-num">${p.n}</div>
            <div class="phase-time">${p.time}</div>
          </div>
          <div class="phase-content">
            <div class="phase-name">${p.name}</div>
            <div class="phase-title">${p.title}</div>
            <div class="phase-desc">${p.desc}</div>
          </div>
        </div>
      `;
    });
  }

  // FUP Days
  if (data.fupDays) {
    html += `<div class="subsection-title">Mapa del FUP</div>`;
    data.fupDays.forEach(d => {
      html += `
        <div class="fup-day">
          <div class="fup-day-badge" style="color: ${d.color};">
            <div class="fup-day-label">día</div>
            <div class="fup-day-num">${d.n}</div>
          </div>
          <div class="fup-day-content">
            <div class="fup-day-title">${d.title}</div>
            <div class="fup-day-desc">${d.desc}</div>
          </div>
        </div>
      `;
    });
    html += `<div class="subsection-divider"></div>`;
  }

  // Sections with messages
  if (data.sections) {
    data.sections.forEach(sec => {
      html += `<div class="subsection-title">${sec.subtitle}</div>`;
      sec.messages.forEach(m => {
        const isFav = favorites.some(f => f.id === m.id);
        html += `
          <div class="msg-group">
            <div class="msg-meta">
              <div class="msg-label">${m.label}</div>
              <button class="fav-btn ${isFav ? 'active' : ''}" data-msgid="${m.id}" onclick="toggleFavorite(event, '${m.id}', '${escapeHtml(m.label)}', '${encodeURIComponent(m.text)}', '${m.type}')">★</button>
            </div>
            <button class="msg-card type-${m.type}" onclick="copyMsg(this, '${encodeURIComponent(m.text)}')">${escapeHtml(m.text)}<div class="msg-card-tap">[tap para copiar]</div></button>
          </div>
        `;
      });
    });
  }

  // Objeciones
  if (data.objeciones) {
    data.objeciones.forEach(o => {
      html += `
        <div class="obj-item">
          <div class="obj-q">${o.q}</div>
          <div class="obj-a">${o.a}</div>
        </div>
      `;
    });
  }

  // Prices
  if (data.prices) {
    data.prices.forEach(p => {
      html += `
        <div class="price-card">
          <div class="price-card-header">
            <div class="price-card-name">${p.name}</div>
            <div class="price-card-price">${p.price}</div>
          </div>
      `;
      p.rows.forEach(r => {
        html += `
          <div class="price-card-row">
            <div class="price-card-row-label">${r[0]}</div>
            <div class="price-card-row-val">${r[1]}</div>
          </div>
        `;
      });
      html += `</div>`;
    });
  }

  if (data.bottomTip) {
    html += `<div class="tip ${data.bottomTip.type}"><span class="tip-icon">${data.bottomTip.type === 'red' ? '⛔' : '⭐'}</span><div>${data.bottomTip.text}</div></div>`;
  }

  container.innerHTML = html;
}

function escapeHtml(str) {
  return String(str).replace(/'/g, '&apos;').replace(/"/g, '&quot;');
}

// ========== COPY ==========
function copyMsg(el, encoded) {
  const text = decodeURIComponent(encoded);
  // Extract actual text if the button contains the tap hint
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ Copiado al portapapeles');
    el.style.background = 'rgba(212, 255, 78, 0.08)';
    setTimeout(() => el.style.background = '', 400);
  }).catch(() => {
    showToast('No pude copiar. Selecciona manualmente.');
  });
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ========== FAVORITES ==========
function toggleFavorite(e, id, label, encodedText, type) {
  e.stopPropagation();
  const existing = favorites.findIndex(f => f.id === id);
  if (existing >= 0) {
    favorites.splice(existing, 1);
    showToast('✕ Removido de favoritos');
  } else {
    favorites.push({ id, label, text: decodeURIComponent(encodedText), type });
    showToast('★ Agregado a favoritos');
  }
  localStorage.setItem('playbook_favs', JSON.stringify(favorites));
  // Update button
  const btn = e.target;
  btn.classList.toggle('active');
}

function renderFavorites() {
  const container = document.getElementById('favoritesContainer');
  if (favorites.length === 0) {
    container.innerHTML = '<div class="fav-empty">Aún no tienes favoritos. Toca la ★ en cualquier mensaje.</div>';
    return;
  }
  let html = '';
  favorites.forEach(f => {
    html += `
      <div class="msg-group">
        <div class="msg-meta">
          <div class="msg-label">${f.label}</div>
          <button class="fav-btn active" onclick="removeFavorite(event, '${f.id}')">★</button>
        </div>
        <button class="msg-card type-${f.type}" onclick="copyMsg(this, '${encodeURIComponent(f.text)}')">${escapeHtml(f.text)}<div class="msg-card-tap">[tap para copiar]</div></button>
      </div>
    `;
  });
  container.innerHTML = html;
}

function removeFavorite(e, id) {
  e.stopPropagation();
  favorites = favorites.filter(f => f.id !== id);
  localStorage.setItem('playbook_favs', JSON.stringify(favorites));
  renderFavorites();
  showToast('✕ Removido de favoritos');
}

// ========== SEARCH ==========
function buildSearchIndex() {
  const index = [];
  Object.keys(DATA).forEach(scenKey => {
    const scen = DATA[scenKey];
    (scen.sections || []).forEach(sec => {
      (sec.messages || []).forEach(m => {
        index.push({
          scenario: scenKey,
          scenarioTitle: scen.title,
          subsection: sec.subtitle,
          label: m.label,
          text: m.text,
          type: m.type,
          id: m.id
        });
      });
    });
    (scen.objeciones || []).forEach((o, i) => {
      index.push({
        scenario: scenKey,
        scenarioTitle: scen.title,
        subsection: 'Objeciones',
        label: o.q,
        text: o.a,
        type: 'zoom',
        id: 'obj-' + i
      });
    });
  });
  return index;
}

const searchIndex = buildSearchIndex();

function performSearch(query) {
  const q = query.toLowerCase().trim();
  if (!q) {
    document.getElementById('searchResults').classList.remove('active');
    if (currentView === 'home') {
      document.getElementById('homeView').classList.remove('hidden');
    } else {
      document.getElementById('scenarioView').classList.add('active');
    }
    return;
  }

  const results = searchIndex.filter(item => {
    return item.text.toLowerCase().includes(q) ||
           item.label.toLowerCase().includes(q) ||
           item.subsection.toLowerCase().includes(q) ||
           item.scenarioTitle.toLowerCase().includes(q);
  });

  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('scenarioView').classList.remove('active');
  document.getElementById('searchResults').classList.add('active');

  const container = document.getElementById('searchResults');
  if (results.length === 0) {
    container.innerHTML = `<div class="search-empty">Nada que coincida con "<strong>${escapeHtml(query)}</strong>"</div>`;
    return;
  }

  let html = `<div class="section-label">${results.length} resultado${results.length === 1 ? '' : 's'}</div>`;
  results.forEach(r => {
    html += `
      <button class="search-result-item" onclick="copyMsg(this, '${encodeURIComponent(r.text)}')">
        <div class="search-result-type">${r.type}</div>
        <div class="search-result-location">${r.scenarioTitle} · ${r.subsection}</div>
        <div class="search-result-preview">${escapeHtml(r.text)}</div>
      </button>
    `;
  });
  container.innerHTML = html;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  performSearch('');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const val = e.target.value;
  document.getElementById('searchClear').classList.toggle('show', val.length > 0);
  performSearch(val);
});

// ========== INIT ==========
renderFavorites();
</script>
