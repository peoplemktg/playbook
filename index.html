<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playbook Elite Luque Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .gradient-text { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #E2E8F0; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: #4F46E5; cursor: pointer; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px rgba(79, 70, 229, 0.3); }
        .tab-active { background-color: #4F46E5 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const apiKey = ""; // AIzaSyBNg5Cx1aGdeK72mFy0Wn83CZPTj9c-pZo

        const DATA = {
            stages: [
                { id: 0, title: "Pre-Calificación", time: "0-5 min", icon: "users", tip: "Conecta con el 'Gancho de Similitud'. ¿Es dueño o bombero?", 
                  questions: ["¿Qué tipo de negocio lideras hoy?", "Sobre el VSL de la Kryptonita, ¿qué fue lo que más resonó contigo?", "Hey, estás en [País], ¿cómo va el mercado allá?"] },
                { id: 1, title: "Freno de Mano", time: "5-15 min", icon: "shield-alert", tip: "Busca la Kryptonita. El negocio es un Ferrari con el freno puesto.", 
                  questions: ["¿Qué es hoy ese 'freno de mano' que no te deja acelerar?", "¿Cuánto dinero dejas sobre la mesa por este desorden?", "Si no quitamos este freno hoy, ¿dónde estarás en 12 meses?"] },
                { id: 2, title: "Calificación", time: "15-25 min", icon: "filter", tip: "Define el producto. <$5k = Axcelerate. >$5k = MDD.", 
                  questions: ["¿Cuál es tu facturación mensual real?", "¿Tienes equipo o eres tú haciendo todo?", "¿Estás listo para dejar de ser bombero y ser el CEO?"] },
                { id: 3, title: "Plan de 3 Pasos", time: "25-35 min", icon: "sparkles", tip: "Identidad, Sistemas y Escalabilidad.", formula: "Identidad Dron -> Sistemas -> Aceleración Ferrari." },
                { id: 4, title: "Cierre Elite", time: "35-45 min", icon: "check-circle", tip: "Acción inmediata. La lista de espera es real.", 
                  questions: ["¿Tarjeta de crédito o débito?", "Si no cerramos hoy, el cupo se libera. ¿Avanzamos?"] }
            ],
            templates: [
                { cat: "Confirmación (Urgencia)", items: [
                    { title: "24h Antes (Escasez)", text: "Hola [nombre], soy David de Luque Academy. Confirmada nuestra sesión de mañana para analizar tus fugas financieras y neutralizar tu Kryptonita. Como viste en el video, protegemos mucho el tiempo; si no confirmas hoy, el sistema cancelará la cita para dársela a alguien en lista de espera. ¿Confirmas?" },
                    { title: "1h Antes (Recordatorio)", text: "Hola [nombre], en 1 hora empezamos. Ten a mano tus números reales para identificar dónde está la fuga financiera. Es solo una oportunidad para agendar. Nos vemos puntual aquí: [LINK]" }
                ]},
                { cat: "Seguimiento (Kryptonita)", items: [
                    { title: "Post-Llamada (Acción)", text: "Hola [nombre], me quedé pensando en el plan de 3 acciones que diseñamos. Cada día que pasa sin ejecutarlo, la Kryptonita sigue drenando tus finanzas. ¿Activamos MDD hoy o dejamos que el cupo pase a la siguiente persona?" },
                    { title: "Axcelerate ($195)", text: "Quedamos pendientes tras nuestra charla. Del 13 al 15 tenemos Axcelerate — 3 días de inmersión virtual para salir con un plan claro. Acceso especial por $195. ¿Lo retomamos?" }
                ]}
            ],
            closingActions: [
                { id: "paid", label: "Pagado ✅", color: "bg-emerald-50 text-emerald-700" },
                { id: "link", label: "Link Enviado 🔗", color: "bg-blue-50 text-blue-700" },
                { id: "nurturing", label: "Axcelerate ⏳", color: "bg-amber-50 text-amber-700" },
                { id: "lost", label: "Perdido ❄️", color: "bg-rose-50 text-rose-700" }
            ]
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [tab, setTab] = useState('live');
            const [stage, setStage] = useState(0);
            const [timer, setTimer] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [history, setHistory] = useState([]);
            const [aiData, setAiData] = useState({ plan: "", objection: "", loading: false });
            const [copyOk, setCopyOk] = useState("");
            
            const [form, setForm] = useState({ name: '', revenue: 0, kryptonite: '', status: 'nurturing' });

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('luque_elite_v6');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) {
                            setHistory(parsed);
                        }
                    }
                } catch (e) {
                    console.error("Error loading history", e);
                }
            }, []);

            useEffect(() => {
                let interval;
                if (isTimerRunning) interval = setInterval(() => setTimer(t => t + 1), 1000);
                return () => clearInterval(interval);
            }, [isTimerRunning]);

            const copy = (txt) => {
                const el = document.createElement("textarea"); el.value = txt; document.body.appendChild(el);
                el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setCopyOk("¡Copiado!"); setTimeout(() => setCopyOk(""), 2000);
            };

            const analyze = async () => {
                if (!form.kryptonite || !form.name) return;
                setAiData(prev => ({ ...prev, loading: true }));
                const prompt = `Analiza para Luque Academy: Dueño ${form.name}, Kryptonita: ${form.kryptonite}, Factura: $${form.revenue}. Crea un PLAN de 3 pasos (Identidad, Sistemas, Escalabilidad) y una OBJECION con REBATE basado en el Ferrari y el Freno de Mano. Formato: PLAN: ... OBJECION: ... REBATE: ...`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const d = await res.json();
                    const txt = d.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    
                    const planPart = txt.split(/OBJECION:/i)[0].replace(/PLAN:/i, '').trim();
                    const objectionPart = txt.split(/OBJECION:/i)[1] || "";
                    
                    setAiData({ plan: planPart, objection: objectionPart, loading: false });
                    setStage(3);
                } catch (e) { 
                    setAiData(prev => ({ ...prev, loading: false })); 
                }
            };

            const save = () => {
                const newEntry = { ...form, id: Date.now(), date: new Date().toLocaleDateString(), plan: aiData.plan };
                const updated = [newEntry, ...history];
                setHistory(updated);
                localStorage.setItem('luque_elite_v6', JSON.stringify(updated));
                setForm({ name: '', revenue: 0, kryptonite: '', status: 'nurturing' });
                setAiData({ plan: "", objection: "", loading: false });
                setTimer(0); setIsTimerRunning(false); setTab('history');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {copyOk && <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-3 rounded-full z-[100] shadow-2xl font-bold animate-bounce text-sm">{copyOk}</div>}

                    {/* Navbar Elite */}
                    <header className="bg-white border-b border-slate-200 py-4 px-8 sticky top-0 z-50 flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-100"><Icon name="shield-check" className="text-white" /></div>
                            <div>
                                <h1 className="text-xl font-black uppercase tracking-tighter gradient-text">Playbook Elite</h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Luque Academy · David Muñoz</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3 bg-slate-50 px-5 py-2 rounded-2xl border border-slate-100">
                                <span className="font-mono text-xl font-black text-slate-700">{Math.floor(timer/60)}:{String(timer%60).padStart(2,'0')}</span>
                                <button onClick={() => setIsTimerRunning(!isTimerRunning)} className={`px-5 py-1.5 rounded-xl text-[10px] font-black tracking-widest transition-all ${isTimerRunning ? 'bg-rose-500 text-white shadow-lg shadow-rose-100' : 'bg-emerald-500 text-white shadow-lg shadow-emerald-100'}`}>
                                    {isTimerRunning ? 'STOP ZOOM' : 'START LIVE'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto w-full p-6 md:p-8 grid grid-cols-1 md:grid-cols-12 gap-8 flex-1">
                        {/* Sidebar */}
                        <aside className="md:col-span-3 space-y-4">
                            <nav className="space-y-2">
                                {[
                                    { id: 'live', icon: 'zap', label: 'Script de Venta' },
                                    { id: 'templates', icon: 'send', label: 'Plantillas WhatsApp' },
                                    { id: 'history', icon: 'history', label: 'Historial Cierres' }
                                ].map(t => (
                                    <button key={t.id} onClick={() => setTab(t.id)} className={`w-full flex items-center gap-4 p-5 rounded-[2rem] font-bold text-sm transition-all ${tab === t.id ? 'tab-active' : 'bg-white text-slate-500 hover:bg-slate-50 border border-slate-100 shadow-sm'}`}>
                                        <Icon name={t.icon} /> {t.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-xl shadow-slate-200/50">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Comisiones Estimadas</p>
                                <div className="text-4xl font-black text-slate-900 leading-none">${(history?.length || 0) * 90}</div>
                                <p className="text-[10px] mt-4 text-indigo-500 font-bold italic leading-tight">"Sin fecha = Lead muerto."</p>
                            </div>
                        </aside>

                        {/* Content Area */}
                        <section className="md:col-span-9">
                            {tab === 'live' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    {/* Timeline Stepper */}
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 flex justify-between gap-4 overflow-x-auto no-scrollbar">
                                        {DATA?.stages?.map((s, idx) => (
                                            <button key={idx} onClick={() => setStage(idx)} className={`flex-shrink-0 flex flex-col items-center p-4 rounded-3xl transition-all min-w-[120px] ${stage === idx ? 'bg-indigo-50 border border-indigo-100 ring-2 ring-indigo-500/10' : 'opacity-40'}`}>
                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mb-2 shadow-sm ${stage === idx ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon name={s.icon} /></div>
                                                <span className="text-[10px] font-black uppercase tracking-tighter">{s.title}</span>
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                        {/* Main Script */}
                                        <div className="lg:col-span-7 bg-white rounded-[3rem] p-10 shadow-xl shadow-slate-200/50 border border-slate-100 space-y-8">
                                            <div className="flex justify-between items-center border-b border-slate-100 pb-6">
                                                <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-900">{DATA?.stages?.[stage]?.title}</h2>
                                                <span className="bg-slate-900 text-white px-5 py-2 rounded-2xl text-[11px] font-black tracking-widest uppercase">{DATA?.stages?.[stage]?.time}</span>
                                            </div>
                                            <div className="bg-indigo-50/50 p-6 rounded-3xl border-l-[6px] border-indigo-600 text-[13px] text-indigo-950 font-bold italic leading-relaxed">
                                                "{DATA?.stages?.[stage]?.tip}"
                                            </div>
                                            <div className="space-y-4">
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Preguntas Maestro:</p>
                                                {DATA?.stages?.[stage]?.questions?.map((q, i) => (
                                                    <div key={i} onClick={() => copy(q)} className="p-6 bg-slate-50/50 rounded-[2rem] border border-slate-100 hover:bg-white hover:border-indigo-400 hover:shadow-xl hover:shadow-indigo-100/30 cursor-pointer transition-all flex justify-between items-center group">
                                                        <p className="text-[15px] font-bold text-slate-700 leading-snug">{q}</p>
                                                        <Icon name="copy" size={16} className="text-slate-300 group-hover:text-indigo-600" />
                                                    </div>
                                                ))}
                                            </div>
                                            {stage === 3 && aiData.plan && (
                                                <div className="p-8 bg-slate-900 text-white rounded-[2.5rem] shadow-2xl relative overflow-hidden animate-in zoom-in">
                                                    <Icon name="sparkles" className="absolute top-6 right-6 text-indigo-400 opacity-30" size={40} />
                                                    <h4 className="text-[10px] font-black text-indigo-400 uppercase mb-4 tracking-widest border-b border-white/10 pb-2 flex items-center gap-2"><Icon name="brain" size={14}/> Plan Estratégico IA</h4>
                                                    <p className="text-sm font-medium leading-relaxed italic text-indigo-50 whitespace-pre-line">{aiData.plan}</p>
                                                    {aiData.objection && (
                                                        <div className="mt-6 p-5 bg-rose-950/40 rounded-2xl border border-rose-500/30">
                                                            <span className="text-[9px] font-black text-rose-400 uppercase block mb-2">Alerta: Objeción Probable</span>
                                                            <p className="text-xs text-rose-100 font-bold leading-relaxed">{aiData.objection}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        {/* Profiler Panel */}
                                        <div className="lg:col-span-5 bg-white rounded-[2.5rem] p-8 shadow-xl shadow-slate-200/50 border border-slate-100 space-y-6 h-fit sticky top-32">
                                            <h3 className="text-sm font-black uppercase flex items-center gap-3"><Icon name="target" className="text-indigo-600" /> Profiler Elite</h3>
                                            <div className="space-y-5">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Nombre del Lead</label>
                                                    <input type="text" placeholder="Ej. Juan Pérez" className="w-full p-5 bg-slate-50 rounded-[1.5rem] text-sm font-bold border-none outline-none focus:ring-2 focus:ring-indigo-600 shadow-inner" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                                </div>
                                                <div className="bg-slate-50/50 p-6 rounded-[2rem] border border-slate-100">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Facturación Mensual</label>
                                                        <span className="font-black text-indigo-700">${form.revenue.toLocaleString()}</span>
                                                    </div>
                                                    <input type="range" min="0" max="60000" step="1000" value={form.revenue} onChange={e => setForm({...form, revenue: parseInt(e.target.value)})} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Kryptonita / Fuga de Dinero</label>
                                                    <textarea placeholder="Describe el dolor específico que detectaste..." className="w-full h-32 p-5 bg-slate-50 rounded-[1.5rem] text-[13px] font-medium outline-none resize-none focus:bg-white focus:ring-2 focus:ring-indigo-600 shadow-inner border-none" value={form.kryptonite} onChange={e => setForm({...form, kryptonite: e.target.value})} />
                                                </div>
                                                <button onClick={analyze} disabled={aiData.loading || !form.kryptonite} className="w-full bg-indigo-100 text-indigo-700 p-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition-all shadow-md shadow-indigo-100/50 flex items-center justify-center gap-2">
                                                    {aiData.loading ? "Analizando Fugas..." : <React.Fragment><Icon name="sparkles" size={14}/> Predecir Plan & Objeción</React.Fragment>}
                                                </button>
                                                <div className="grid grid-cols-2 gap-2 border-t pt-5">
                                                    {DATA?.closingActions?.map(a => (
                                                        <button key={a.id} onClick={() => setForm({...form, status: a.id})} className={`p-4 rounded-2xl text-[9px] font-black border transition-all ${form.status === a.id ? 'bg-[#0F172A] text-white shadow-xl' : 'bg-white text-slate-500 border-slate-100 hover:border-indigo-200'}`}>{a.label}</button>
                                                    ))}
                                                </div>
                                                <button onClick={save} disabled={!form.name} className="w-full bg-[#1E293B] text-white p-6 rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-2xl hover:bg-black active:scale-95 transition-all">Guardar Cierre</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'templates' && (
                                <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-500">
                                    <div className="bg-indigo-950 p-12 rounded-[3.5rem] text-white relative overflow-hidden shadow-2xl">
                                        <Icon name="send" size={80} className="absolute -right-8 -bottom-8 opacity-10 rotate-12" />
                                        <h2 className="text-4xl font-black uppercase tracking-tighter mb-2">Librería de Mensajes</h2>
                                        <p className="text-indigo-300 font-bold tracking-widest uppercase text-xs">Concepto: Escasez, Kryptonita y Resultados Reales</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {DATA?.templates?.map((cat, idx) => (
                                            <div key={idx} className="space-y-4">
                                                <h3 className="text-xs font-black text-indigo-600 uppercase tracking-[0.3em] ml-6">{cat.cat}</h3>
                                                <div className="space-y-4">
                                                    {cat?.items?.map((item, i) => (
                                                        <div key={i} onClick={() => copy(item.text)} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-200/40 hover:shadow-2xl hover:border-indigo-400 transition-all cursor-pointer group flex flex-col justify-between h-full">
                                                            <div>
                                                                <div className="flex justify-between items-start mb-4">
                                                                    <h4 className="font-black text-slate-900 text-sm uppercase tracking-tighter">{item.title}</h4>
                                                                    <Icon name="clipboard" className="text-slate-200 group-hover:text-indigo-600" />
                                                                </div>
                                                                <p className="text-xs text-slate-600 italic leading-relaxed bg-slate-50 p-5 rounded-3xl border border-slate-50 group-hover:bg-indigo-50/30 transition-colors">"{item.text}"</p>
                                                            </div>
                                                            <div className="mt-6 flex items-center gap-2 text-[10px] font-black text-emerald-600 uppercase"><Icon name="check-circle" size={12}/> Oficial Luque Academy</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {tab === 'history' && (
                                <div className="space-y-8 animate-in slide-in-from-right duration-500">
                                    <div className="flex justify-between items-end mb-4">
                                        <h2 className="text-4xl font-black uppercase tracking-tighter">Historial Elite</h2>
                                        <div className="bg-white px-6 py-3 rounded-3xl shadow-lg border border-slate-100 flex gap-6">
                                            <div className="text-center"><p className="text-[9px] font-black text-slate-400 uppercase">Leads</p><p className="text-xl font-black text-indigo-600">{history?.length || 0}</p></div>
                                            <div className="text-center"><p className="text-[9px] font-black text-slate-400 uppercase">Com. Total</p><p className="text-xl font-black text-emerald-600">${(history?.length || 0) * 90}</p></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 gap-6">
                                        {(!history || history.length === 0) ? <div className="bg-white p-24 rounded-[3rem] text-center border-2 border-dashed border-slate-200 text-slate-400 font-black uppercase tracking-widest">Sin registros aún</div> :
                                            history.map(n => (
                                                <div key={n.id} className="bg-white rounded-[3rem] p-10 border border-slate-100 shadow-xl shadow-slate-200/40 hover:shadow-2xl transition-all group overflow-hidden">
                                                    <div className="flex justify-between items-start mb-8">
                                                        <div className="flex gap-6">
                                                            <div className="w-16 h-16 rounded-[1.5rem] bg-indigo-600 text-white flex items-center justify-center font-black text-2xl shadow-xl">{n?.name?.[0] || '?'}</div>
                                                            <div>
                                                                <h3 className="text-2xl font-black text-slate-900">{n.name}</h3>
                                                                <div className="flex gap-4 mt-2">
                                                                    <span className="text-[10px] font-black uppercase text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">{n.product}</span>
                                                                    <span className="text-[10px] font-black uppercase text-slate-400">Factura: ${n?.revenue?.toLocaleString() || 0}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end gap-3">
                                                            <span className={`px-5 py-2 rounded-full text-[10px] font-black uppercase border ${DATA?.closingActions?.find(a => a.id === n.status)?.color || 'bg-slate-50'}`}>{DATA?.closingActions?.find(a => a.id === n.status)?.label || 'Estado'}</span>
                                                            <button onClick={() => {
                                                                const updated = history.filter(x => x.id !== n.id);
                                                                setHistory(updated); localStorage.setItem('luque_elite_v6', JSON.stringify(updated));
                                                            }} className="text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" size={18} /></button>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                        <div className="bg-slate-50/80 p-6 rounded-[2rem] border border-slate-100 shadow-inner">
                                                            <span className="text-[9px] font-black text-slate-400 uppercase block mb-2 border-b pb-1">Diagnóstico Kryptonita</span>
                                                            <p className="text-sm font-bold italic text-slate-700">"{n.kryptonite}"</p>
                                                        </div>
                                                        {n.plan && <div className="bg-[#0F172A] p-6 rounded-[2rem] text-[13px] text-slate-200 leading-relaxed italic">{n.plan}</div>}
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            )}
                        </section>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
